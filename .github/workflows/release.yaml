name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag/version to build, e.g. 4.11.0-tp.0'
        required: true
        type: string

env:
  PLUGIN_NAME: tasknotes

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Update manifest version from tag
        run: |
          # Extract version from tag (or use the manual workflow input).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${VERSION#v}"
          echo "Setting version to: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_PATH=docs/releases/$VERSION.md" >> "$GITHUB_ENV"

          # Update manifest.json with the tag version
          jq --arg version "$VERSION" '.version = $version' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

          # Verify the change
          echo "Updated manifest.json:"
          cat manifest.json

      - name: Install Dependencies
        run: npm install

      - name: Build Plugin
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}
        run: |
          cat <<EOF > .env
          GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
          GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
          MICROSOFT_OAUTH_CLIENT_ID=${MICROSOFT_OAUTH_CLIENT_ID}
          EOF
          npm run build  # This includes CSS building via npm run build-css

      - name: Verify release notes
        run: |
          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Release notes file not found: $RELEASE_NOTES_PATH"
            exit 1
          fi
          echo "Using release notes from $RELEASE_NOTES_PATH"

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: |
            main.js
            manifest.json
            styles.css
          draft: false
